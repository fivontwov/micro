apiVersion: v1
kind: Service
metadata:
  name: study-management
  namespace: microservices
  labels:
    app: study-management
spec:
  type: ClusterIP
  ports:
  - port: 8082
    targetPort: 8082
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: grpc
  selector:
    app: study-management
