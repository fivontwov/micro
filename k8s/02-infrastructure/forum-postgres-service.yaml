apiVersion: v1
kind: Service
metadata:
  name: forum-postgres
  namespace: microservices
  labels:
    app: forum-postgres
spec:
  type: ClusterIP
  clusterIP: None   # Headless service cho StatefulSet
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: forum-postgres
