apiVersion: apps/v1
kind: Deployment
metadata:
  name: study-management
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: study-management
  template:
    metadata:
      labels:
        app: study-management
    spec:
      containers:
      - name: study-management
        image: micro-study-management-service:latest
        imagePullPolicy: Never  # Use local image
        ports:
        - containerPort: 8082
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: SERVER_PORT
          value: "8082"
        - name: GRPC_SERVER_PORT
          value: "9090"
        # Database - Study Postgres (postgres:15, host: study-postgres)
        - name: DATASOURCE_URL
          value: "jdbc:postgresql://study-postgres:5432/study_management"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: postgres-password
        # Redis
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_PORT
        # Eureka
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: EUREKA_SERVER_URL
        livenessProbe:
          httpGet:
            path: /
            port: 8082
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
