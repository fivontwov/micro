apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: microservices
  labels:
    app: zookeeper
spec:
  type: ClusterIP
  ports:
  - port: 2181
    targetPort: 2181
    protocol: TCP
    name: client
  selector:
    app: zookeeper
  clusterIP: None  # Headless service for StatefulSet
