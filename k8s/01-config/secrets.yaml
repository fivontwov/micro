apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: microservices
type: Opaque
data:
  # All values are base64 encoded
#  linux/mac
  # To encode: echo -n 'your-value' | base64
  # To decode: echo 'encoded-value' | base64 -d
#  win
#    [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("postgres"))
#[Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("cG9zdGdyZXM="))

    # PostgreSQL credentials
  postgres-user: cG9zdGdyZXM=                    # postgres
  postgres-password: MTIzNDU2                    # 123456
  
  # Mailtrap credentials
  mail-username: MTA5YjI5ODkzMmU1ZTQ=            # 109b298932e5e4
  mail-password: ZjIyZjI4ODI3OWE1ZGU=            # f22f288279a5de
  
  # JWT Secret (example - change in production)
  jwt-secret: bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXNpZ25pbmctMjAyNA==   # my-super-secret-key-for-jwt-signing-2024
