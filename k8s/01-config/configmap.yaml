apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: microservices
data:
  # ===== PostgreSQL - Forum (postgres:16) =====
  FORUM_POSTGRES_HOST: "forum-postgres"
  FORUM_POSTGRES_PORT: "5432"
  FORUM_POSTGRES_DB: "forum"

  # ===== PostgreSQL - Study Management (postgres:15) =====
  STUDY_POSTGRES_HOST: "study-postgres"
  STUDY_POSTGRES_PORT: "5432"
  STUDY_POSTGRES_DB: "study_management"

  # ===== Redis =====
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # ===== Kafka =====
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  ZOOKEEPER_CONNECT: "zookeeper:2181"

  # ===== Eureka =====
  EUREKA_SERVER_URL: "http://eureka:8761/eureka/"

  # ===== gRPC =====
  GRPC_SERVER_PORT: "9090"

  # ===== Spring =====
  SPRING_PROFILES_ACTIVE: "production"

  # ===== Email (Mailtrap) =====
  MAIL_HOST: "sandbox.smtp.mailtrap.io"
  MAIL_PORT: "2525"
